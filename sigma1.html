<DOCTYPE html>
<html>
    <head>
        <title>Загрузка<title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
            let Log;
            
            window.onload = function() {
                Log += "Новое посещение\n";
                
                fetch('https://api.ipify.org')
                    .then(response => response.json())
                    .then(data => Log += data.ip);
                    
                location.href = '/';
            }
        </script>
    </body>
</html>
